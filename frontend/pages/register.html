<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - File Converter</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #000000 0%, #121212 50%, #1a1a1a 100%); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; }
        .register-container { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 3rem; width: 100%; max-width: 400px; }
        .register-container h1 { color: white; text-align: center; margin-bottom: 2rem; }
        .register-container h1 i { color: #8c00ff; margin-right: 10px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: white; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; font-size: 1rem; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #8c00ff; }
        .register-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #8c00ff, #4b0082); color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }
        .register-btn:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(140, 0, 255, 0.4); }
        .login-link { text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.7); }
        .login-link a { color: #8c00ff; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .error-msg { color: #ff4444; text-align: center; margin-bottom: 1rem; display: none; }
        .success-msg { color: #4ade80; text-align: center; margin-bottom: 1rem; display: none; }
        .back-home { text-align: center; margin-top: 1rem; }
        .back-home a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .back-home a:hover { color: white; }
    </style>
</head>
<body>
    <div class="register-container">
        <h1><i class="fas fa-user-plus"></i> Sign Up</h1>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Date of Birth (for password recovery)</label>
                <input type="date" id="signupDOB" placeholder="Select your date of birth">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required>
            </div>
            <button type="submit" class="register-btn"><i class="fas fa-user-plus"></i> Sign Up</button>
        </form>
        <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
        <p class="back-home"><a href="../index.html"><i class="fas fa-home"></i> Back to Home</a></p>
    </div>

    <script>
        const API_URL = 'http://localhost:4000/api';
        const form = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        // Handle Enter key press for registration
        document.getElementById('signupUsername').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        document.getElementById('signupEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        document.getElementById('signupPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const date_of_birth = document.getElementById('signupDOB').value.trim();
            
            if (!username || !email || !password) {
                errorMsg.textContent = 'Please fill all fields';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch(API_URL + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, date_of_birth })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    successMsg.textContent = 'Registration successful! Redirecting...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.message || 'Registration failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Error connecting to server. Make sure backend is running on port 4000';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
